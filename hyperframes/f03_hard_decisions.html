  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    gsap.set('#line-hard', { opacity:0 });
    gsap.set('#line-felt', { opacity:0 });
    gsap.set('#teal-rule', { opacity:0, scaleX:0, transformOrigin:'left center' });
    gsap.set('#signal-mark', { opacity:0 });
    gsap.set('.scene-label', { opacity:0 });

    tl.to('#signal-mark', { opacity:0.06, duration:1.2, ease:'power1.out' }, 0);
    tl.to('#line-hard', { opacity:1, duration:1.0, ease:'power2.out' }, 0.4);
    tl.to('#line-felt', { opacity:1, duration:1.0, ease:'power2.out' }, 0.8);
    tl.to('#teal-rule', { opacity:1, scaleX:1, duration:0.6, ease:'power2.out' }, 1.4);
    tl.to('.scene-label', { opacity:0.7, duration:0.5, ease:'power2.out' }, 1.6);

    tl.to('#line-hard', { opacity:0, duration:0.6, ease:'power2.in' }, 4.2);
    tl.to('#line-felt', { opacity:0, duration:0.6, ease:'power2.in' }, 4.3);
    tl.to('#teal-rule', { opacity:0, duration:0.4, ease:'power2.in' }, 4.2);
    tl.to('#signal-mark', { opacity:0, duration:0.8, ease:'power2.in' }, 4.2);
    tl.to('.scene-label', { opacity:0, duration:0.3, ease:'power2.in' }, 4.4);

    window.__timelines['f03-hard-decisions'] = tl;

    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.createElement('button');
      btn.textContent = '▶ Play';
      btn.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;background:#00afaa;color:#04111A;border:none;padding:10px 28px;font-size:15px;font-weight:700;border-radius:4px;cursor:pointer;letter-spacing:0.08em;';
      document.body.appendChild(btn);
      btn.addEventListener('click', function() { tl.restart(); btn.textContent = '↺ Replay'; });
    });
  </script>
