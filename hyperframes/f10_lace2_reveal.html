<!DOCTYPE html>
<html>
<body>
<div data-composition-id="f10-lace2-reveal" data-width="1280" data-height="720" style="width:1280px;height:720px;overflow:hidden;position:relative;background:transparent;">

  <style>
    @font-face { font-family:'FranzSans'; src:url('../assets/FranzSans-ExtraBold.otf') format('opentype'); font-weight:800; font-display:block; }
    @font-face { font-family:'FranzSans'; src:url('../assets/FranzSans-SemiBold.otf') format('opentype'); font-weight:600; font-display:block; }
    @font-face { font-family:'FranzSans'; src:url('../assets/FranzSans-Light.otf') format('opentype'); font-weight:300; font-display:block; }

    [data-composition-id="f10-lace2-reveal"] { background:#04111A; font-family:'FranzSans',sans-serif; }

    .signal-mark { position:absolute; bottom:-60px; right:-60px; width:400px; height:400px; opacity:0.1; }

    .scene-content {
      position:absolute; top:0; left:0; width:100%; height:100%;
      display:flex; flex-direction:column; justify-content:center; align-items:flex-start;
      padding:80px 120px; box-sizing:border-box;
    }

    .lace-label {
      font-family:'FranzSans',sans-serif; font-weight:800;
      font-size:22px; letter-spacing:0.22em; text-transform:uppercase;
      color:#00afaa; margin-bottom:12px;
    }
    .headline-teal {
      font-family:'FranzSans',sans-serif; font-weight:800;
      font-size:100px; line-height:0.95; letter-spacing:-0.03em;
      color:#00afaa;
    }
    .headline-white {
      font-family:'FranzSans',sans-serif; font-weight:800;
      font-size:100px; line-height:0.95; letter-spacing:-0.03em;
      color:#ffffff;
    }
    .teal-line { width:2px; height:48px; background:#00afaa; margin:28px 0; }
    .sub-line {
      font-family:'FranzSans',sans-serif; font-weight:300;
      font-size:32px; line-height:1.3; letter-spacing:0.04em;
      color:rgba(255,255,255,0.65);
    }
    .scene-label {
      position:absolute; bottom:32px; right:40px; font-family:'FranzSans',sans-serif;
      font-weight:300; font-size:13px; letter-spacing:0.12em; color:#00afaa; opacity:0;
    }
  </style>

  <svg class="signal-mark" id="signal-mark" viewBox="0 0 375.89 375.89" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path fill="#00aea9" d="m88.34,240.86l12.67-12.67-17.12-17.12,63.66-64.03,17.05,17.05,12.67-12.67-17.12-17.12,47.28-47.58c15.12-15.12,15.12-39.65,0-54.7l-.44-.44c-15.12-15.12-39.65-15.12-54.7,0l-4.82,4.82-4.82-4.82c-15.12-15.12-39.65-15.12-54.7,0l-.44.44c-14.23,14.23-15.05,36.91-2.37,52.1h0l1.33,1.26,12.75-12.75-1.33-1.33c-5.71-8.15-5.04-19.42,2.22-26.68l.44-.44c8.15-8.15,21.34-8.15,29.5,0l4.89,4.89-63.59,64.03-4.82-4.82c-15.12-15.12-39.65-15.12-54.7,0l-.44.44c-14.23,14.23-15.05,36.91-2.37,52.1l12.75-12.75c-5.71-8.15-5.04-19.42,2.22-26.68l.44-.44c8.15-8.15,21.34-8.15,29.5,0l4.89,4.89-47.51,47.8c-15.12,15.12-15.12,39.65,0,54.7l.44.44c15.12,15.12,39.65,15.12,54.7,0l4.97-4.97,17.12,17.12-.22-.07Z"/>

  </svg>

  <div class="scene-content">
    <div class="lace-label" id="lace-label">LACE 2.0</div>
    <span class="headline-teal" id="line-evolve">Evolve</span>
    <span class="headline-white" id="line-purpose">with purpose.</span>
    <div class="teal-line" id="teal-line"></div>
    <div class="sub-line" id="sub-line">Sharper. More focused. Confident.</div>
  </div>

  <div class="scene-label">FRAME 10</div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    gsap.set('#signal-mark', { opacity:0 });
    gsap.set('#lace-label', { opacity:0, y:20 });
    gsap.set('#line-evolve', { opacity:0, y:60, scale:1.06, transformOrigin:'left center' });
    gsap.set('#line-purpose', { opacity:0, y:60, scale:1.06, transformOrigin:'left center' });
    gsap.set('#teal-line', { opacity:0, scaleY:0, transformOrigin:'top center' });
    gsap.set('#sub-line', { opacity:0, y:16 });
    gsap.set('.scene-label', { opacity:0 });

    tl.to('#signal-mark', { opacity:0.1, duration:0.8, ease:'power2.out' }, 0);
    tl.to('#lace-label', { opacity:1, y:0, duration:0.4, ease:'power3.out' }, 0.2);
    tl.to('#line-evolve', { opacity:1, y:0, scale:1, duration:0.3, ease:'expo.out' }, 0.45);
    tl.to('#line-purpose', { opacity:1, y:0, scale:1, duration:0.3, ease:'expo.out' }, 0.58);
    tl.to('#teal-line', { opacity:1, scaleY:1, duration:0.4, ease:'power3.out' }, 0.8);
    tl.to('#sub-line', { opacity:1, y:0, duration:0.5, ease:'power2.out' }, 0.95);
    tl.to('.scene-label', { opacity:0.7, duration:0.4, ease:'power2.out' }, 1.1);

    tl.to(['#lace-label','#line-evolve','#line-purpose','#teal-line','#sub-line'], { opacity:0, y:-20, duration:0.4, ease:'power2.in', stagger:0.04 }, 4.2);
    tl.to('#signal-mark', { opacity:0, duration:0.5, ease:'power2.in' }, 4.2);
    tl.to('.scene-label', { opacity:0, duration:0.3 }, 4.3);

    window.__timelines['f10-lace2-reveal'] = tl;

    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.createElement('button');
      btn.textContent = '▶ Play';
      btn.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;background:#00afaa;color:#04111A;border:none;padding:10px 28px;font-size:15px;font-weight:700;border-radius:4px;cursor:pointer;letter-spacing:0.08em;';
      document.body.appendChild(btn);
      btn.addEventListener('click', function() { tl.restart(); btn.textContent = '↺ Replay'; });
    });
  </script>
</div>
</body>
</html>
