<!DOCTYPE html>
<html>
<body>
<div data-composition-id="f24-end-card" data-width="1280" data-height="720" style="width:1280px;height:720px;overflow:hidden;position:relative;background:transparent;">

  <style>
    @font-face { font-family:'FranzSans'; src:url('../assets/FranzSans-ExtraBold.otf') format('opentype'); font-weight:800; font-display:block; }
    @font-face { font-family:'FranzSans'; src:url('../assets/FranzSans-Light.otf') format('opentype'); font-weight:300; font-display:block; }

    [data-composition-id="f24-end-card"] { background:#04111A; font-family:'FranzSans',sans-serif; }

    .signal-mark { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:680px; height:680px; opacity:0.07; }

    .scene-content {
      position:absolute; top:0; left:0; width:100%; height:100%;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      padding:80px 120px; box-sizing:border-box;
    }

    .word-block {
      display:flex; flex-direction:column; align-items:center; gap:0;
    }

    .big-word {
      font-family:'FranzSans',sans-serif; font-weight:800;
      font-size:136px; line-height:0.92; letter-spacing:-0.04em;
      color:#ffffff; text-align:center;
    }
    .big-word.teal { color:#00afaa; }

    .teal-rule { width:2px; height:52px; background:#00afaa; margin:24px 0; }

    .lace-lockup {
      display:flex; align-items:center; gap:12px; margin-top:20px;
    }
    .lace-lockup-text {
      font-family:'FranzSans',sans-serif; font-weight:800;
      font-size:18px; letter-spacing:0.22em; text-transform:uppercase;
      color:rgba(255,255,255,0.5);
    }
    .lace-lockup-version {
      font-family:'FranzSans',sans-serif; font-weight:300;
      font-size:14px; letter-spacing:0.12em; color:#00afaa;
    }

    .scene-label {
      position:absolute; bottom:32px; right:40px; font-family:'FranzSans',sans-serif;
      font-weight:300; font-size:13px; letter-spacing:0.12em; color:#00afaa; opacity:0;
    }
  </style>

  <svg class="signal-mark" id="signal-mark" viewBox="0 0 375.89 375.89" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

  <div class="scene-content">
    <div class="word-block">
      <span class="big-word" id="w-stronger">Stronger.</span>
      <span class="big-word" id="w-sharper">Sharper.</span>
      <span class="big-word teal" id="w-better">Better.</span>
    </div>
    <div class="teal-rule" id="teal-rule"></div>
    <div class="lace-lockup" id="lockup">
      <span class="lace-lockup-text">LACE</span>
      <span class="lace-lockup-version">2.0</span>
    </div>
  </div>

  <div class="scene-label">FRAME 24</div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    gsap.set('#signal-mark', { opacity:0, scale:0.9, transformOrigin:'center center' });
    gsap.set('#w-stronger', { opacity:0, y:70, scale:1.08, transformOrigin:'center center' });
    gsap.set('#w-sharper',  { opacity:0, y:70, scale:1.08, transformOrigin:'center center' });
    gsap.set('#w-better',   { opacity:0, y:70, scale:1.08, transformOrigin:'center center' });
    gsap.set('#teal-rule',  { opacity:0, scaleY:0, transformOrigin:'top center' });
    gsap.set('#lockup',     { opacity:0 });
    gsap.set('.scene-label',{ opacity:0 });

    tl.to('#signal-mark', { opacity:0.07, scale:1, duration:1.2, ease:'power2.out' }, 0);
    tl.to('#w-stronger', { opacity:1, y:0, scale:1, duration:0.28, ease:'expo.out' }, 0.3);
    tl.to('#w-sharper',  { opacity:1, y:0, scale:1, duration:0.28, ease:'expo.out' }, 0.46);
    tl.to('#w-better',   { opacity:1, y:0, scale:1, duration:0.28, ease:'expo.out' }, 0.62);
    tl.to('#teal-rule',  { opacity:1, scaleY:1, duration:0.5, ease:'power3.out' }, 0.9);
    tl.to('#lockup',     { opacity:1, duration:0.6, ease:'power2.out' }, 1.1);
    tl.to('.scene-label',{ opacity:0.7, duration:0.4, ease:'power2.out' }, 1.3);

    window.__timelines['f24-end-card'] = tl;

    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.createElement('button');
      btn.textContent = '▶ Play';
      btn.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;background:#00afaa;color:#04111A;border:none;padding:10px 28px;font-size:15px;font-weight:700;border-radius:4px;cursor:pointer;letter-spacing:0.08em;';
      document.body.appendChild(btn);
      btn.addEventListener('click', function() { tl.restart(); btn.textContent = '↺ Replay'; });
    });
  </script>
</div>
</body>
</html>
