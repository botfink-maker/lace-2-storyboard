  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    gsap.set('#line1', { opacity: 0, y: 60, scale: 1.08 });
    gsap.set('#line2', { opacity: 0, y: 60, scale: 1.08 });
    gsap.set('#teal-line', { opacity: 0, scaleY: 0, transformOrigin: 'top center' });
    gsap.set('.scene-label', { opacity: 0 });
    gsap.set('#signal-mark', { x: 0, opacity: 0 });

    tl.to('#signal-mark', { opacity: 0.12, duration: 0.6, ease: 'power2.out' }, 0.1);

    tl.to('#line1', { opacity: 1, y: 0, scale: 1, duration: 0.25, ease: 'expo.out' }, 0.3);
    tl.to('#line2', { opacity: 1, y: 0, scale: 1, duration: 0.25, ease: 'expo.out' }, 0.42);
    tl.to('#teal-line', { opacity: 1, scaleY: 1, duration: 0.4, ease: 'power3.out' }, 0.6);
    tl.to('.scene-label', { opacity: 0.7, duration: 0.5, ease: 'power2.out' }, 0.7);

    tl.to('#line1', { opacity: 0, y: -20, duration: 0.4, ease: 'power2.in' }, 3.8);
    tl.to('#line2', { opacity: 0, y: -20, duration: 0.4, ease: 'power2.in' }, 3.88);
    tl.to('#teal-line', { opacity: 0, duration: 0.3, ease: 'power2.in' }, 3.85);
    tl.to('#signal-mark', { opacity: 0, duration: 0.5, ease: 'power2.in' }, 3.8);
    tl.to('.scene-label', { opacity: 0, duration: 0.3, ease: 'power2.in' }, 3.9);

    window.__timelines['s01-opening'] = tl;

    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.createElement('button');
      btn.textContent = '▶ Play';
      btn.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;background:#00afaa;color:#0d1920;border:none;padding:10px 28px;font-size:15px;font-weight:700;border-radius:4px;cursor:pointer;letter-spacing:0.08em;';
      document.body.appendChild(btn);
      btn.addEventListener('click', function() {
        tl.restart();
        btn.textContent = '↺ Replay';
      });
    });
  </script>
