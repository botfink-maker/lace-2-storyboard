<!DOCTYPE html>
<html>
<body>
<div data-composition-id="f11-changes-how-we" data-width="1280" data-height="720" style="width:1280px;height:720px;overflow:hidden;position:relative;background:transparent;">

  <style>
    @font-face { font-family:'FranzSans'; src:url('../assets/FranzSans-ExtraBold.otf') format('opentype'); font-weight:800; font-display:block; }
    @font-face { font-family:'FranzSans'; src:url('../assets/FranzSans-SemiBold.otf') format('opentype'); font-weight:600; font-display:block; }
    @font-face { font-family:'FranzSans'; src:url('../assets/FranzSans-Light.otf') format('opentype'); font-weight:300; font-display:block; }

    [data-composition-id="f11-changes-how-we"] { background:#04111A; font-family:'FranzSans',sans-serif; }

    .signal-mark { position:absolute; bottom:-60px; right:-60px; width:400px; height:400px; opacity:0.08; }

    .scene-content {
      position:absolute; top:0; left:0; width:100%; height:100%;
      display:flex; flex-direction:column; justify-content:center; align-items:flex-start;
      padding:80px 120px; box-sizing:border-box;
    }

    .intro-line {
      font-family:'FranzSans',sans-serif; font-weight:300;
      font-size:26px; letter-spacing:0.08em; color:rgba(0,175,170,0.7);
      text-transform:uppercase; margin-bottom:28px;
    }
    .list-item {
      display:flex; align-items:center; gap:20px; margin-bottom:14px;
    }
    .list-dash { width:28px; height:2px; background:#00afaa; flex-shrink:0; }
    .list-text {
      font-family:'FranzSans',sans-serif; font-weight:800;
      font-size:68px; line-height:1.0; letter-spacing:-0.02em; color:#ffffff;
    }
    .scene-label {
      position:absolute; bottom:32px; right:40px; font-family:'FranzSans',sans-serif;
      font-weight:300; font-size:13px; letter-spacing:0.12em; color:#00afaa; opacity:0;
    }
  </style>

  <div class="scene-content">
    <div class="intro-line" id="intro">Changes how we</div>
    <div class="list-item" id="item1">
      <div class="list-dash"></div>
      <div class="list-text">Take work to market.</div>
    </div>
    <div class="list-item" id="item2">
      <div class="list-dash"></div>
      <div class="list-text">Package.</div>
    </div>
    <div class="list-item" id="item3">
      <div class="list-dash"></div>
      <div class="list-text">Price.</div>
    </div>
    <div class="list-item" id="item4">
      <div class="list-dash"></div>
      <div class="list-text">Deliver.</div>
    </div>
  </div>

  <div class="scene-label">FRAME 11</div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    gsap.set('#signal-mark', { opacity:0 });
    gsap.set('#intro', { opacity:0, y:16 });
    gsap.set(['#item1','#item2','#item3','#item4'], { opacity:0, x:-30 });
    gsap.set('.scene-label', { opacity:0 });

    tl.to('#signal-mark', { opacity:0.08, duration:0.8, ease:'power2.out' }, 0);
    tl.to('#intro', { opacity:1, y:0, duration:0.4, ease:'power2.out' }, 0.2);
    tl.to('#item1', { opacity:1, x:0, duration:0.3, ease:'expo.out' }, 0.5);
    tl.to('#item2', { opacity:1, x:0, duration:0.3, ease:'expo.out' }, 0.7);
    tl.to('#item3', { opacity:1, x:0, duration:0.3, ease:'expo.out' }, 0.9);
    tl.to('#item4', { opacity:1, x:0, duration:0.3, ease:'expo.out' }, 1.1);
    tl.to('.scene-label', { opacity:0.7, duration:0.4, ease:'power2.out' }, 1.3);

    tl.to(['#intro','#item1','#item2','#item3','#item4'], { opacity:0, y:-16, duration:0.4, ease:'power2.in', stagger:0.05 }, 4.4);
    tl.to('#signal-mark', { opacity:0, duration:0.5, ease:'power2.in' }, 4.4);
    tl.to('.scene-label', { opacity:0, duration:0.3 }, 4.5);

    window.__timelines['f11-changes-how-we'] = tl;

    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.createElement('button');
      btn.textContent = '▶ Play';
      btn.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;background:#00afaa;color:#04111A;border:none;padding:10px 28px;font-size:15px;font-weight:700;border-radius:4px;cursor:pointer;letter-spacing:0.08em;';
      document.body.appendChild(btn);
      btn.addEventListener('click', function() { tl.restart(); btn.textContent = '↺ Replay'; });
    });
  </script>
</div>
